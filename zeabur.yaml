services:
  - name: mysql
    type: mysql
    plan: free

  - name: backend
    type: nodejs
    source:
      type: git
      path: Backend
    env:
      MYSQL_HOST: ${{ mysql.MYSQL_HOST }}
      MYSQL_USER: ${{ mysql.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ mysql.MYSQL_PASSWORD }}
      MYSQL_DATABASE: ${{ mysql.MYSQL_DATABASE }}
      MYSQL_PORT: ${{ mysql.MYSQL_PORT }}
      BACKEND_URL: ${{ backend.ZEABUR_WEB_URL }}

  - name: blogweb
    type: static
    source:
      type: git
      path: BlogWeb
    env:
      VITE_API_URL: ${{ backend.ZEABUR_WEB_URL }}
    buildCommand: npm install && npm run build
    outputDirectory: dist
